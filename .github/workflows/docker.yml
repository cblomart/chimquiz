name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. .NET build + quality ───────────────────────────────────────────────
  build-dotnet:
    name: .NET Build & Quality
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build — warnings as errors (includes Roslyn + SecurityCodeScan)
        run: dotnet build --no-restore -warnaserror

      - name: Unit tests
        run: dotnet test ChimQuiz.Tests/ --logger "console;verbosity=minimal"

      - name: Format check
        run: dotnet format --verify-no-changes --no-restore

      - name: Vulnerable NuGet packages
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          if grep -q "has the following vulnerable packages" vuln.txt; then
            echo "❌ Vulnerable NuGet packages detected!"
            exit 1
          fi
          echo "✅ No vulnerable NuGet packages"

  # ── 2. JavaScript lint + security ────────────────────────────────────────
  lint-js:
    name: JS Lint & Security
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ESLint + plugins
        run: npm install

      - name: ESLint (quality + security + complexity)
        run: npm run lint

  # ── 3. Cyclomatic complexity (C# + JS) ───────────────────────────────────
  complexity:
    name: Complexity Check
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Install lizard
        run: pip install lizard

      - name: Complexity — C# (fail > CCN 15)
        run: |
          lizard ChimQuiz -l csharp \
            --CCN 15 \
            --warnings_only \
            --output_file lizard-csharp.txt || true
          cat lizard-csharp.txt
          if [ -s lizard-csharp.txt ]; then echo "❌ CCN violations found"; exit 1; fi
          echo "✅ No CCN violations"

      - name: Complexity — JS (fail > CCN 15)
        run: |
          lizard ChimQuiz/wwwroot/js/src -l javascript \
            --CCN 15 \
            --length 80 \
            --warnings_only \
            --output_file lizard-js.txt || true
          cat lizard-js.txt
          if [ -s lizard-js.txt ]; then echo "❌ CCN violations found"; exit 1; fi
          echo "✅ No CCN violations"

      - name: Upload complexity reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complexity-report
          path: lizard-*.txt
          retention-days: 30

  # ── 4. SAST — Semgrep (C# + JS, OWASP rules) ─────────────────────────────
  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan (csharp + javascript + secrets)
        run: |
          semgrep scan \
            --config p/csharp \
            --config p/javascript \
            --config p/secrets \
            --config p/owasp-top-ten \
            --error \
            --json \
            --output semgrep-report.json \
            . || (cat semgrep-report.json | python3 -m json.tool; exit 1)

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json
          retention-days: 30

  # ── 5. Security scan — Trivy ──────────────────────────────────────────────
  scan-trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — filesystem (secrets + Dockerfile misconfigs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: chimquiz:scan
          load: true

      - name: Trivy — Docker image (OS + libs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: chimquiz:scan
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.txt
          retention-days: 30

  # ── 6. Publish to ghcr.io — on push (sha tag) or release (semver tag) ────
  publish:
    name: Publish to ghcr.io
    runs-on: ubuntu-latest
    needs: [build-dotnet, lint-js, complexity, sast, scan-trivy]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (
        github.event_name == 'release' ||
        (
          needs.build-dotnet.result == 'success' &&
          needs.lint-js.result == 'success' &&
          needs.complexity.result == 'success' &&
          needs.sast.result == 'success' &&
          needs.scan-trivy.result == 'success'
        )
      )
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short,enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=${{ github.event.release.tag_name || format('sha-{0}', github.sha) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 7. Deploy to Azure Container Apps — only on release ───────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [publish]
    if: github.event_name == 'release'
    permissions:
      contents: read

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy new image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}"
          az containerapp update \
            --name chimquiz \
            --resource-group rg-chimquiz \
            --image "$IMAGE" \
            --set-env-vars "APP_VERSION=${{ github.event.release.tag_name }}"
