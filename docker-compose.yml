version: '3.8'
services:
  chimquiz:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - chimquiz_data:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DatabasePath=/data/chimquiz.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chimquiz_data:
